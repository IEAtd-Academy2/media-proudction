<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة | ميديا برودكشن</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // ⚠️ ضع مفاتيحك هنا (نفس المفاتيح التي ستضعها في index.html)
    const SUPABASE_URL = 'YOUR_SUPABASE_URL'; 
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    
    // التحقق من صحة الرابط لتجنب ظهور خطأ (Invalid supabaseUrl)
    const isSupabaseConfigured = SUPABASE_URL.startsWith('http');
    const supabase = isSupabaseConfigured ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    function AdminPanel() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      
      // بيانات الفورم للإدخال
      const [title, setTitle] = useState('');
      const [category, setCategory] = useState('بوست');
      const [duration, setDuration] = useState('');
      const [image, setImage] = useState('');
      const [link, setLink] = useState('');
      
      const [statusMsg, setStatusMsg] = useState('');

      useEffect(() => {
        if (isSupabaseConfigured && supabase) {
          supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) setIsAuthenticated(true);
          });
        }
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!isSupabaseConfigured) return;

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) setStatusMsg('خطأ في تسجيل الدخول. تأكد من الإيميل والباسورد.');
        else setIsAuthenticated(true);
      };

      const handleAddContent = async (e) => {
        e.preventDefault();
        if (!isSupabaseConfigured) return;

        setStatusMsg('جاري الإضافة...');
        
        const { error } = await supabase
          .from('visual_content')
          .insert([{ title, category, duration, image, link }]);

        if (error) {
          setStatusMsg('حدث خطأ أثناء الإضافة: ' + error.message);
        } else {
          setStatusMsg('تمت الإضافة بنجاح! ستظهر الآن في الصفحة الرئيسية.');
          setTitle(''); setDuration(''); setImage(''); setLink(''); // تفريغ الحقول
        }
      };

      // إذا لم يتم إدخال مفاتيح Supabase بعد، نظهر رسالة تنبيه بدلاً من الخطأ
      if (!isSupabaseConfigured) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="glass p-8 rounded-2xl w-full max-w-lg text-center space-y-4 border border-red-500/30">
              <h2 className="text-2xl font-bold text-red-400">تنبيه هام</h2>
              <p className="text-gray-300 leading-relaxed">
                مفاتيح <b>Supabase</b> غير صالحة أو مفقودة. يرجى فتح الكود واستبدال <code>YOUR_SUPABASE_URL</code> و <code>YOUR_SUPABASE_ANON_KEY</code> بالمفاتيح الحقيقية الخاصة بك لكي تعمل لوحة الإدارة.
              </p>
            </div>
          </div>
        );
      }

      if (!isAuthenticated) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <form onSubmit={handleLogin} className="glass p-8 rounded-2xl w-full max-w-md space-y-4">
              <h2 className="text-2xl font-bold text-center mb-6 text-purple-400">تسجيل دخول الإدارة</h2>
              <input type="email" placeholder="الإيميل" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-purple-500 outline-none" required />
              <input type="password" placeholder="كلمة المرور" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-purple-500 outline-none" required />
              <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 p-3 rounded font-bold transition">دخول</button>
              <p className="text-red-400 text-center text-sm">{statusMsg}</p>
            </form>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-8 max-w-4xl mx-auto">
          <div className="flex justify-between items-center mb-10 border-b border-slate-700 pb-4">
            <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">لوحة تحكم ميديا برودكشن</h1>
            <div className="flex gap-4">
              <a href="index.html" target="_blank" className="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition">رؤية الموقع</a>
              <button onClick={() => { supabase.auth.signOut(); setIsAuthenticated(false); }} className="px-4 py-2 bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white rounded-lg transition">تسجيل خروج</button>
            </div>
          </div>

          <div className="glass p-8 rounded-3xl">
            <h2 className="text-2xl font-bold mb-6">إضافة محتوى مرئي جديد</h2>
            <form onSubmit={handleAddContent} className="space-y-6">
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm text-gray-400 mb-2">عنوان التصميم / الفيديو</label>
                  <input type="text" value={title} onChange={e=>setTitle(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required placeholder="مثال: ديزاين عرض اليوم الوطني" />
                </div>
                
                <div>
                  <label className="block text-sm text-gray-400 mb-2">القسم (الفئة)</label>
                  <select value={category} onChange={e=>setCategory(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none">
                    <option>تصميمات</option>
                    <option>بوست</option>
                    <option>كاروسيل</option>
                    <option>بروفايل</option>
                    <option>ريلز او فيديوهات</option>
                    <option>شروحات لمنصة الأكاديمية</option>
                    <option>شروحات لمنصة انفينيتي</option>
                  </select>
                </div>

                <div>
                  <label className="block text-sm text-gray-400 mb-2">المدة / النوع</label>
                  <input type="text" value={duration} onChange={e=>setDuration(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required placeholder="مثال: صورة، 1:30 دقيقة، ملف PDF" />
                </div>

                <div>
                  <label className="block text-sm text-gray-400 mb-2">رابط صورة الغلاف (URL)</label>
                  <input type="url" value={image} onChange={e=>setImage(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none text-left" dir="ltr" required placeholder="https://..." />
                </div>
              </div>

              <div>
                <label className="block text-sm text-gray-400 mb-2">الرابط الخارجي (Google Drive / YouTube)</label>
                <input type="url" value={link} onChange={e=>setLink(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none text-left" dir="ltr" required placeholder="https://drive.google.com/..." />
              </div>

              <button type="submit" className="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-bold p-4 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                إضافة المحتوى للقاعدة
              </button>

              {statusMsg && <div className={`p-4 rounded-lg text-center font-bold ${statusMsg.includes('بنجاح') ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>{statusMsg}</div>}
            </form>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<AdminPanel />);
  </script>
</body>
</html>
