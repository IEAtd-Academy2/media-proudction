<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة | ميديا برودكشن</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #6b21a8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #9333ea; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // ==========================================
    // إعدادات Supabase الخاصة بك
    // ==========================================
    const SUPABASE_URL = 'https://ieskeelafgbvgmjdeccs.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_dptrZNb8r_QsktBuE4bmQw_rCGGGhDX';
    
    const isSupabaseConfigured = SUPABASE_URL.startsWith('http');
    const supabase = isSupabaseConfigured ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    function AdminPanel() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      
      const [activeTab, setActiveTab] = useState('visual'); // 'visual' | 'written' | 'offers' | 'platforms'
      const [statusMsg, setStatusMsg] = useState('');

      // --- حالات فورم المحتوى المرئي ---
      const [vTitle, setVTitle] = useState('');
      const [vCategory, setVCategory] = useState('تصميمات');
      const [vDuration, setVDuration] = useState('');
      const [vImage, setVImage] = useState('');
      const [vLink, setVLink] = useState('');

      // --- حالات فورم المحتوى المكتوب ---
      const [wTitle, setWTitle] = useState('');
      const [wExcerpt, setWExcerpt] = useState('');
      const [wDate, setWDate] = useState('');
      const [wAuthor, setWAuthor] = useState('');

      // --- حالات فورم العروض الفعالة ---
      const [oTitle, setOTitle] = useState('');
      const [oDiscount, setODiscount] = useState('');
      const [oDescription, setODescription] = useState('');
      const [oValidity, setOValidity] = useState('');
      const [oColor, setOColor] = useState('from-pink-500 to-rose-500');

      // --- حالات المنصات ---
      const [academyStatus, setAcademyStatus] = useState('working'); // 'working' | 'maintenance'
      const [infinityStatus, setInfinityStatus] = useState('maintenance');
      const [isLoadingStatus, setIsLoadingStatus] = useState(false);

      useEffect(() => {
        if (isSupabaseConfigured && supabase) {
          supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
              setIsAuthenticated(true);
              fetchPlatformStatus();
            }
          });
        }
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!isSupabaseConfigured) return;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) setStatusMsg('خطأ في تسجيل الدخول. تأكد من الإيميل والباسورد.');
        else {
          setIsAuthenticated(true);
          fetchPlatformStatus();
        }
      };

      // --- وظائف الإضافة لقاعدة البيانات ---

      const handleAddVisual = async (e) => {
        e.preventDefault();
        if (!isSupabaseConfigured) return;
        setStatusMsg('جاري الإضافة...');
        const { error } = await supabase.from('visual_content').insert([{ 
          title: vTitle, category: vCategory, duration: vDuration, image: vImage, link: vLink 
        }]);
        if (error) setStatusMsg('خطأ: ' + error.message);
        else {
          setStatusMsg('تمت إضافة المحتوى المرئي بنجاح!');
          setVTitle(''); setVDuration(''); setVImage(''); setVLink('');
        }
      };

      const handleAddWritten = async (e) => {
        e.preventDefault();
        if (!isSupabaseConfigured) return;
        setStatusMsg('جاري الإضافة...');
        const { error } = await supabase.from('written_content').insert([{ 
          title: wTitle, excerpt: wExcerpt, date: wDate, author: wAuthor 
        }]);
        if (error) setStatusMsg('خطأ: ' + error.message);
        else {
          setStatusMsg('تمت إضافة المقال بنجاح!');
          setWTitle(''); setWExcerpt(''); setWDate(''); setWAuthor('');
        }
      };

      const handleAddOffer = async (e) => {
        e.preventDefault();
        if (!isSupabaseConfigured) return;
        setStatusMsg('جاري الإضافة...');
        const { error } = await supabase.from('offers_content').insert([{ 
          title: oTitle, discount: oDiscount, description: oDescription, validity: oValidity, color: oColor 
        }]);
        if (error) setStatusMsg('خطأ: ' + error.message);
        else {
          setStatusMsg('تمت إضافة العرض بنجاح!');
          setOTitle(''); setODiscount(''); setODescription(''); setOValidity('');
        }
      };

      // --- إدارة حالة المنصات ---

      const fetchPlatformStatus = async () => {
        setIsLoadingStatus(true);
        const { data, error } = await supabase.from('platform_status').select('*');
        if (!error && data && data.length > 0) {
          const academy = data.find(p => p.platform_name === 'academy');
          const infinity = data.find(p => p.platform_name === 'infinity');
          if (academy) setAcademyStatus(academy.status);
          if (infinity) setInfinityStatus(infinity.status);
        }
        setIsLoadingStatus(false);
      };

      const updatePlatformStatus = async (platformName, newStatus) => {
        setStatusMsg('جاري التحديث...');
        // نستخدم upsert لتحديث القيمة إذا كانت موجودة، أو إضافتها إذا لم تكن موجودة
        const { error } = await supabase.from('platform_status').upsert(
          { platform_name: platformName, status: newStatus },
          { onConflict: 'platform_name' }
        );
        
        if (error) {
          setStatusMsg('خطأ في التحديث: ' + error.message);
        } else {
          setStatusMsg('تم تحديث حالة المنصة بنجاح!');
          if(platformName === 'academy') setAcademyStatus(newStatus);
          if(platformName === 'infinity') setInfinityStatus(newStatus);
        }
      };


      if (!isSupabaseConfigured) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="glass p-8 rounded-2xl w-full max-w-lg text-center space-y-4 border border-red-500/30">
              <h2 className="text-2xl font-bold text-red-400">تنبيه هام</h2>
              <p className="text-gray-300 leading-relaxed">
                مفاتيح <b>Supabase</b> غير صالحة أو مفقودة.
              </p>
            </div>
          </div>
        );
      }

      if (!isAuthenticated) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <form onSubmit={handleLogin} className="glass p-8 rounded-2xl w-full max-w-md space-y-4">
              <h2 className="text-2xl font-bold text-center mb-6 text-purple-400">تسجيل دخول الإدارة</h2>
              <input type="email" placeholder="الإيميل" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-purple-500 outline-none" required />
              <input type="password" placeholder="كلمة المرور" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-3 rounded bg-slate-800 border border-slate-700 focus:border-purple-500 outline-none" required />
              <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 p-3 rounded font-bold transition">دخول</button>
              <p className="text-red-400 text-center text-sm">{statusMsg}</p>
            </form>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-4 md:p-8 max-w-5xl mx-auto">
          <div className="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-slate-700 pb-4 gap-4">
            <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">لوحة تحكم ميديا برودكشن</h1>
            <div className="flex gap-4">
              <a href="index.html" target="_blank" className="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition text-sm">رؤية الموقع</a>
              <button onClick={() => { supabase.auth.signOut(); setIsAuthenticated(false); }} className="px-4 py-2 bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white rounded-lg transition text-sm">تسجيل خروج</button>
            </div>
          </div>

          {/* تبويبات الإدارة */}
          <div className="flex flex-wrap gap-2 mb-8">
            {['visual', 'written', 'offers', 'platforms'].map(tab => (
              <button
                key={tab}
                onClick={() => { setActiveTab(tab); setStatusMsg(''); }}
                className={`px-6 py-3 rounded-xl font-bold transition-all ${activeTab === tab ? 'bg-purple-600 text-white' : 'bg-slate-800 text-gray-400 hover:bg-slate-700'}`}
              >
                {tab === 'visual' && 'المحتوى المرئي'}
                {tab === 'written' && 'المحتوى المكتوب'}
                {tab === 'offers' && 'العروض الفعالة'}
                {tab === 'platforms' && 'حالة المنصات'}
              </button>
            ))}
          </div>

          <div className="glass p-6 md:p-8 rounded-3xl">
            {statusMsg && <div className={`mb-6 p-4 rounded-lg text-center font-bold ${statusMsg.includes('بنجاح') ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>{statusMsg}</div>}

            {/* --- نموذج المحتوى المرئي --- */}
            {activeTab === 'visual' && (
              <form onSubmit={handleAddVisual} className="space-y-6 animate-fade-in">
                <h2 className="text-2xl font-bold mb-4">إضافة محتوى مرئي جديد</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label className="block text-sm text-gray-400 mb-2">العنوان</label>
                    <input type="text" value={vTitle} onChange={e=>setVTitle(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-2">الفئة</label>
                    <select value={vCategory} onChange={e=>setVCategory(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none">
                      <option>تصميمات</option><option>بوست</option><option>كاروسيل</option><option>بروفايل</option>
                      <option>ريلز او فيديوهات</option><option>شروحات لمنصة الأكاديمية</option><option>شروحات لمنصة انفينيتي</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-2">المدة / النوع</label>
                    <input type="text" value={vDuration} onChange={e=>setVDuration(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required placeholder="مثال: صورة، 1:30" />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-2">رابط الصورة (Cover)</label>
                    <input type="url" value={vImage} onChange={e=>setVImage(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none text-left" dir="ltr" required />
                  </div>
                </div>
                <div>
                  <label className="block text-sm text-gray-400 mb-2">الرابط الخارجي (Drive/YouTube)</label>
                  <input type="url" value={vLink} onChange={e=>setVLink(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none text-left" dir="ltr" required />
                </div>
                <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 p-4 rounded-xl font-bold transition">إضافة للقاعدة</button>
              </form>
            )}

            {/* --- نموذج المحتوى المكتوب --- */}
            {activeTab === 'written' && (
              <form onSubmit={handleAddWritten} className="space-y-6 animate-fade-in">
                <h2 className="text-2xl font-bold mb-4">إضافة مقال / محتوى مكتوب</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="md:col-span-2">
                    <label className="block text-sm text-gray-400 mb-2">عنوان المقال</label>
                    <input type="text" value={wTitle} onChange={e=>setWTitle(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required />
                  </div>
                  <div className="md:col-span-2">
                    <label className="block text-sm text-gray-400 mb-2">مقتطف (وصف قصير)</label>
                    <textarea value={wExcerpt} onChange={e=>setWExcerpt(e.target.value)} rows="3" className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required></textarea>
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-2">التاريخ</label>
                    <input type="text" value={wDate} onChange={e=>setWDate(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required placeholder="مثال: 15 أكتوبر 2024" />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-2">الكاتب (القسم)</label>
                    <input type="text" value={wAuthor} onChange={e=>setWAuthor(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required placeholder="مثال: فريق كتابة المحتوى" />
                  </div>
                </div>
                <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 p-4 rounded-xl font-bold transition">إضافة للقاعدة</button>
              </form>
            )}

            {/* --- نموذج العروض الفعالة --- */}
            {activeTab === 'offers' && (
              <form onSubmit={handleAddOffer} className="space-y-6 animate-fade-in">
                <h2 className="text-2xl font-bold mb-4">إضافة عرض جديد</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label className="block text-sm text-gray-400 mb-2">اسم العرض</label>
                    <input type="text" value={oTitle} onChange={e=>setOTitle(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-2">قيمة الخصم / الميزة</label>
                    <input type="text" value={oDiscount} onChange={e=>setODiscount(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required placeholder="مثال: خصم 30%" />
                  </div>
                  <div className="md:col-span-2">
                    <label className="block text-sm text-gray-400 mb-2">وصف العرض</label>
                    <textarea value={oDescription} onChange={e=>setODescription(e.target.value)} rows="2" className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required></textarea>
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-2">الصلاحية</label>
                    <input type="text" value={oValidity} onChange={e=>setOValidity(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" required placeholder="مثال: صالح حتى نهاية الشهر" />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-400 mb-2">لون كارت العرض</label>
                    <select value={oColor} onChange={e=>setOColor(e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 focus:border-purple-500 outline-none" dir="ltr">
                      <option value="from-pink-500 to-rose-500">Pink / Rose</option>
                      <option value="from-blue-500 to-cyan-500">Blue / Cyan</option>
                      <option value="from-purple-500 to-indigo-500">Purple / Indigo</option>
                      <option value="from-emerald-500 to-teal-500">Emerald / Teal</option>
                      <option value="from-amber-500 to-orange-500">Amber / Orange</option>
                    </select>
                  </div>
                </div>
                <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 p-4 rounded-xl font-bold transition">إضافة للقاعدة</button>
              </form>
            )}

            {/* --- تحكم حالة المنصات --- */}
            {activeTab === 'platforms' && (
              <div className="space-y-8 animate-fade-in">
                <h2 className="text-2xl font-bold mb-4">إدارة حالة المنصات</h2>
                {isLoadingStatus ? (
                  <p className="text-gray-400 animate-pulse">جاري جلب حالة المنصات...</p>
                ) : (
                  <div className="space-y-6">
                    {/* منصة الأكاديمية */}
                    <div className="p-6 rounded-2xl bg-slate-800/50 border border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4">
                      <div>
                        <h3 className="text-xl font-bold mb-1">المنصة الخاصة بالأكاديمية</h3>
                        <p className="text-sm text-gray-400">الحالة الحالية: {academyStatus === 'working' ? 'تعمل بكفاءة 🟢' : 'متوقفة للتحديثات 🔴'}</p>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => updatePlatformStatus('academy', 'working')} className={`px-4 py-2 rounded-lg font-bold ${academyStatus === 'working' ? 'bg-emerald-600 text-white' : 'bg-slate-700 text-gray-400 hover:bg-slate-600'}`}>تعمل بكفاءة</button>
                        <button onClick={() => updatePlatformStatus('academy', 'maintenance')} className={`px-4 py-2 rounded-lg font-bold ${academyStatus === 'maintenance' ? 'bg-orange-600 text-white' : 'bg-slate-700 text-gray-400 hover:bg-slate-600'}`}>متوقفة للتحديثات</button>
                      </div>
                    </div>

                    {/* منصة انفينيتي */}
                    <div className="p-6 rounded-2xl bg-slate-800/50 border border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4">
                      <div>
                        <h3 className="text-xl font-bold mb-1">المنصة الخاصة بانفينيتي</h3>
                        <p className="text-sm text-gray-400">الحالة الحالية: {infinityStatus === 'working' ? 'تعمل بكفاءة 🟢' : 'متوقفة للتحديثات 🔴'}</p>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => updatePlatformStatus('infinity', 'working')} className={`px-4 py-2 rounded-lg font-bold ${infinityStatus === 'working' ? 'bg-emerald-600 text-white' : 'bg-slate-700 text-gray-400 hover:bg-slate-600'}`}>تعمل بكفاءة</button>
                        <button onClick={() => updatePlatformStatus('infinity', 'maintenance')} className={`px-4 py-2 rounded-lg font-bold ${infinityStatus === 'maintenance' ? 'bg-orange-600 text-white' : 'bg-slate-700 text-gray-400 hover:bg-slate-600'}`}>متوقفة للتحديثات</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<AdminPanel />);
  </script>
</body>
</html>
