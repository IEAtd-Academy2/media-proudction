<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قسم التسويق و الميديا برودكشن | المنصة الإبداعية</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap');
    
    body {
      font-family: 'Cairo', sans-serif;
      background-color: #020617;
      margin: 0;
      padding: 0;
    }

    .bg-animated {
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #3b0764, #000000);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .fade-in-up {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    .delay-300 { animation-delay: 300ms; }
    .delay-400 { animation-delay: 400ms; }

    .perspective-1000 { perspective: 1000px; }
    .preserve-3d { transform-style: preserve-3d; }
    .animate-float-3d { animation: float3d 6s ease-in-out infinite; }
    @keyframes float3d {
      0% { transform: translateY(0px) rotateX(15deg) rotateY(-20deg); }
      50% { transform: translateY(-15px) rotateX(25deg) rotateY(10deg); }
      100% { transform: translateY(0px) rotateX(15deg) rotateY(-20deg); }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #6b21a8; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #9333ea; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import * as icons from 'https://esm.sh/lucide@latest';
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://ieskeelafgbvgmjdeccs.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_dptrZNb8r_QsktBuE4bmQw_rCGGGhDX';
    
    const isSupabaseConfigured = SUPABASE_URL.startsWith('http');
    const supabase = isSupabaseConfigured ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    const Icon = ({ name, className }) => {
      const iconRef = useRef(null);

      useEffect(() => {
        if (iconRef.current && icons.icons[name]) {
          iconRef.current.innerHTML = '';
          const iconNode = icons.icons[name].toSvg();
          const template = document.createElement('template');
          template.innerHTML = iconNode.trim();
          const svgElement = template.content.firstChild;
          if (className) svgElement.setAttribute('class', className);
          iconRef.current.appendChild(svgElement);
        }
      }, [name, className]);

      return <span ref={iconRef} className={`inline-flex items-center justify-center ${className || ''}`} />;
    };

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [rememberMe, setRememberMe] = useState(false);
      const [loginError, setLoginError] = useState('');
      const [isLoggingIn, setIsLoggingIn] = useState(false);

      // --- حالات البيانات ---
      const [visualContentData, setVisualContentData] = useState([]);
      const [writtenContentData, setWrittenContentData] = useState([]);
      const [offersContentData, setOffersContentData] = useState([]);
      
      const [academyStatus, setAcademyStatus] = useState('working');
      const [infinityStatus, setInfinityStatus] = useState('maintenance');

      const [isLoadingData, setIsLoadingData] = useState(false);

      const [activeTab, setActiveTab] = useState('visual'); 
      const [visualFilter, setVisualFilter] = useState('الكل');

      // التحقق من الجلسة
      useEffect(() => {
        const checkSession = async () => {
          if (isSupabaseConfigured && supabase) {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) setIsAuthenticated(true);
          }
          const savedAuth = localStorage.getItem('isMediaProdAuth');
          if (savedAuth === 'true') setIsAuthenticated(true);
        };
        checkSession();
      }, []);

      // جلب البيانات بعد الدخول
      useEffect(() => {
        if (isAuthenticated) {
          fetchAllData();
        }
      }, [isAuthenticated]);

      const fetchAllData = async () => {
        setIsLoadingData(true);
        if (isSupabaseConfigured && supabase) {
          try {
            // 1. جلب المحتوى المرئي
            const { data: visualData } = await supabase.from('visual_content').select('*').order('created_at', { ascending: false });
            if (visualData) setVisualContentData(visualData);

            // 2. جلب المحتوى المكتوب
            const { data: writtenData } = await supabase.from('written_content').select('*').order('created_at', { ascending: false });
            if (writtenData) setWrittenContentData(writtenData);

            // 3. جلب العروض
            const { data: offersData } = await supabase.from('offers_content').select('*').order('created_at', { ascending: false });
            if (offersData) setOffersContentData(offersData);

            // 4. جلب حالة المنصات
            const { data: platformsData } = await supabase.from('platform_status').select('*');
            if (platformsData) {
              const ac = platformsData.find(p => p.platform_name === 'academy');
              const inf = platformsData.find(p => p.platform_name === 'infinity');
              if (ac) setAcademyStatus(ac.status);
              if (inf) setInfinityStatus(inf.status);
            }
          } catch (error) {
            console.error("Error fetching data from Supabase:", error);
          }
        }
        setIsLoadingData(false);
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoginError('');
        setIsLoggingIn(true);

        if (isSupabaseConfigured && supabase) {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) {
             setLoginError('بيانات الدخول غير صحيحة.');
             setIsLoggingIn(false);
          } else {
            setIsAuthenticated(true);
            if (rememberMe) localStorage.setItem('isMediaProdAuth', 'true');
            setIsLoggingIn(false);
          }
        } else {
             setLoginError('قاعدة البيانات غير متصلة.');
             setIsLoggingIn(false);
        }
      };

      const handleLogout = async () => {
        if (isSupabaseConfigured && supabase) {
          await supabase.auth.signOut();
        }
        setIsAuthenticated(false);
        setEmail(''); setPassword(''); setRememberMe(false);
        setActiveTab('visual');
        localStorage.removeItem('isMediaProdAuth');
      };

      const visualCategories = ['الكل', 'تصميمات', 'بوست', 'كاروسيل', 'بروفايل', 'ريلز او فيديوهات', 'شروحات لمنصة الأكاديمية', 'شروحات لمنصة انفينيتي'];
      const filteredVisualContent = visualFilter === 'الكل' ? visualContentData : visualContentData.filter(item => item.category === visualFilter);

      const processingUI = (
        <div className="w-full flex flex-col items-center justify-center py-20 text-center fade-in-up glass-panel rounded-3xl border border-white/5">
          <div className="w-24 h-24 mb-8 relative flex items-center justify-center">
            <span className="absolute inline-flex h-full w-full rounded-full bg-purple-500/20 animate-ping"></span>
            <div className="absolute inset-0 border-t-4 border-b-4 border-purple-500 rounded-full animate-spin"></div>
            <div className="absolute inset-2 border-l-4 border-r-4 border-blue-500 rounded-full animate-spin" style={{ animationDirection: 'reverse', animationDuration: '1.5s' }}></div>
            <Icon name="loader" className="w-8 h-8 text-white animate-pulse" />
          </div>
          <h3 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-l from-purple-400 to-blue-400 mb-4 drop-shadow-md">
            البيانات الآن قيد المعالجة
          </h3>
          <p className="text-gray-400 text-lg max-w-lg mx-auto leading-relaxed">
            نعمل في الوقت الحالي على تجهيز وتحديث المحتوى الإبداعي الخاص بهذا القسم. يرجى العودة لاحقاً لرؤية أحدث أعمالنا!
          </p>
        </div>
      );

      return (
        <div dir="rtl" className="min-h-screen text-white font-sans overflow-x-hidden selection:bg-purple-500 selection:text-white">
          {!isAuthenticated ? (
            /* --- Login Screen --- */
            <div className="min-h-screen flex items-center justify-center bg-animated relative overflow-hidden px-4">
              <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse"></div>
              <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse" style={{ animationDelay: '2s' }}></div>

              <div className="glass-panel w-full max-w-md p-10 rounded-3xl z-10 fade-in-up shadow-2xl shadow-purple-900/20">
                <div className="flex flex-col items-center mb-8">
                  <div className="relative w-28 h-28 mb-10 perspective-1000">
                    <div className="w-full h-full relative preserve-3d animate-float-3d">
                      <div className="absolute inset-0 bg-gradient-to-br from-blue-600/30 to-cyan-500/30 backdrop-blur-md rounded-2xl border border-blue-400/20 flex items-center justify-center shadow-lg" style={{ transform: 'translateZ(-30px)' }}>
                        <Icon name="megaphone" className="w-10 h-10 text-blue-200 opacity-60 transform -rotate-12" />
                      </div>
                      <div className="absolute inset-0 bg-white/5 backdrop-blur-sm rounded-2xl border border-white/10" style={{ transform: 'translateZ(0px) scale(0.95)' }}></div>
                      <div className="absolute inset-0 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-2xl border border-white/30 flex items-center justify-center shadow-[0_0_35px_rgba(168,85,247,0.6)]" style={{ transform: 'translateZ(30px)' }}>
                        <Icon name="play" className="w-12 h-12 text-white ml-2 fill-current" />
                      </div>
                    </div>
                  </div>
                  <h1 className="text-3xl sm:text-4xl font-black bg-clip-text text-transparent bg-gradient-to-l from-blue-400 via-purple-400 to-pink-400 mb-2 drop-shadow-[0_0_15px_rgba(192,132,252,0.3)] tracking-tight text-center">
                    قسم التسويق <br className="sm:hidden" /> والميديا برودكشن
                  </h1>
                </div>

                <form onSubmit={handleLogin} className="space-y-6">
                  <div>
                    <label className="block text-sm font-medium text-gray-300 mb-2">البريد الإلكتروني</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"><Icon name="user" className="h-5 w-5 text-gray-500" /></div>
                      <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="block w-full pr-10 pl-3 py-3 border border-gray-700 rounded-xl bg-gray-900/50 text-gray-100 focus:ring-purple-500 focus:border-purple-500" required dir="ltr" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-300 mb-2">كلمة المرور</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"><Icon name="lock" className="h-5 w-5 text-gray-500" /></div>
                      <input type={showPassword ? 'text' : 'password'} value={password} onChange={(e) => setPassword(e.target.value)} className="block w-full pr-10 pl-10 py-3 border border-gray-700 rounded-xl bg-gray-900/50 text-gray-100 focus:ring-purple-500 focus:border-purple-500" required dir="ltr" />
                      <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 hover:text-gray-300">
                        {showPassword ? <Icon name="eyeOff" className="h-5 w-5" /> : <Icon name="eye" className="h-5 w-5" />}
                      </button>
                    </div>
                  </div>
                  <div className="flex items-center">
                    <input id="remember-me" type="checkbox" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} className="h-4 w-4 rounded border-gray-700 bg-gray-900/50 text-purple-500 cursor-pointer accent-purple-500" />
                    <label htmlFor="remember-me" className="mr-2 block text-sm text-gray-300 cursor-pointer select-none">تذكرني</label>
                  </div>
                  {loginError && <div className="text-red-400 text-sm bg-red-950/50 p-3 rounded-lg border border-red-900/50 text-center animate-pulse">{loginError}</div>}
                  <button type="submit" disabled={isLoggingIn} className="w-full flex justify-center items-center py-3.5 px-4 rounded-xl font-bold text-white bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 shadow-lg shadow-purple-600/20 transform hover:scale-[1.02] disabled:opacity-70">
                    {isLoggingIn ? <Icon name="loader" className="w-5 h-5 animate-spin" /> : 'تسجيل الدخول'}
                  </button>
                </form>
              </div>
            </div>
          ) : (
            /* --- Dashboard --- */
            <div className="min-h-screen bg-[#020617] relative">
              <div className="absolute top-0 left-0 right-0 h-[500px] bg-gradient-to-b from-purple-900/20 to-transparent pointer-events-none"></div>

              <header className="fixed top-0 w-full z-50 glass-panel border-b border-white/5">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center gap-2 sm:gap-4 fade-in-up">
                      <div className="relative w-12 h-12 perspective-1000 ml-1 sm:ml-2">
                        <div className="w-full h-full relative preserve-3d animate-float-3d">
                          <div className="absolute inset-0 bg-gradient-to-br from-blue-600/30 to-cyan-500/30 backdrop-blur-md rounded-xl flex items-center justify-center" style={{ transform: 'translateZ(-15px)' }}>
                            <Icon name="megaphone" className="w-5 h-5 text-blue-200 opacity-60 transform -rotate-12" />
                          </div>
                          <div className="absolute inset-0 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(168,85,247,0.5)]" style={{ transform: 'translateZ(15px)' }}>
                            <Icon name="play" className="w-5 h-5 text-white ml-1 fill-current" />
                          </div>
                        </div>
                      </div>
                      <span className="text-lg sm:text-2xl font-black bg-clip-text text-transparent bg-gradient-to-l from-blue-400 via-purple-400 to-pink-400 tracking-tight">قسم التسويق والميديا</span>
                    </div>
                    <button onClick={handleLogout} className="group fade-in-up flex items-center gap-3 px-3 py-2 sm:px-5 sm:py-2.5 rounded-xl bg-white/5 hover:bg-red-500/10 border border-white/10 text-gray-300 hover:text-red-400 transition-all duration-500">
                      <span className="text-sm font-bold hidden sm:block">خروج</span>
                      <div className="w-8 h-8 rounded-lg bg-white/5 group-hover:bg-red-500/20 flex items-center justify-center"><Icon name="logOut" className="w-4 h-4" /></div>
                    </button>
                  </div>
                </div>
              </header>

              <main className="pt-32 pb-20 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
                {/* --- Hero Section --- */}
                <div className="text-center mb-12 relative z-10">
                  <h1 className="text-5xl md:text-7xl font-black mb-6 tracking-tight fade-in-up delay-100">
                    حيث يتحول <span className="bg-clip-text text-transparent bg-gradient-to-l from-purple-400 to-blue-500">الخيال</span> إلى واقع
                  </h1>
                </div>

                {/* --- Platform Status --- */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-16 fade-in-up delay-300 relative z-10 max-w-4xl mx-auto">
                  <div className={`glass-panel p-5 rounded-2xl border-r-4 ${academyStatus === 'working' ? 'border-r-emerald-500' : 'border-r-orange-500'} flex items-center justify-between`}>
                    <div className="flex items-center gap-4">
                      <div className={`w-12 h-12 rounded-xl flex items-center justify-center ${academyStatus === 'working' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-orange-500/10 text-orange-400'}`}>
                        <Icon name={academyStatus === 'working' ? "checkCircle" : "alertTriangle"} className="w-6 h-6" />
                      </div>
                      <div>
                        <h3 className="font-bold text-white text-lg">منصة الأكاديمية</h3>
                        <p className="text-gray-400 text-sm">النظام الآلي</p>
                      </div>
                    </div>
                    <div className={`flex items-center gap-2 border px-4 py-2 rounded-full ${academyStatus === 'working' ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-orange-500/10 border-orange-500/20 text-orange-400'}`}>
                      <span className={`relative flex h-3 w-3`}><span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${academyStatus === 'working' ? 'bg-emerald-400' : 'bg-orange-400'}`}></span><span className={`relative inline-flex rounded-full h-3 w-3 ${academyStatus === 'working' ? 'bg-emerald-500' : 'bg-orange-500'}`}></span></span>
                      <span className="text-sm font-bold">{academyStatus === 'working' ? 'تعمل بكفاءة' : 'متوقفة للتحديثات'}</span>
                    </div>
                  </div>

                  <div className={`glass-panel p-5 rounded-2xl border-r-4 ${infinityStatus === 'working' ? 'border-r-emerald-500' : 'border-r-orange-500'} flex items-center justify-between`}>
                    <div className="flex items-center gap-4">
                      <div className={`w-12 h-12 rounded-xl flex items-center justify-center ${infinityStatus === 'working' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-orange-500/10 text-orange-400'}`}>
                        <Icon name={infinityStatus === 'working' ? "checkCircle" : "alertTriangle"} className="w-6 h-6" />
                      </div>
                      <div>
                        <h3 className="font-bold text-white text-lg">منصة انفينيتي</h3>
                        <p className="text-gray-400 text-sm">بوابة التجار</p>
                      </div>
                    </div>
                    <div className={`flex items-center gap-2 border px-4 py-2 rounded-full ${infinityStatus === 'working' ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-orange-500/10 border-orange-500/20 text-orange-400'}`}>
                      <span className={`relative flex h-3 w-3`}><span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${infinityStatus === 'working' ? 'bg-emerald-400' : 'bg-orange-400'}`}></span><span className={`relative inline-flex rounded-full h-3 w-3 ${infinityStatus === 'working' ? 'bg-emerald-500' : 'bg-orange-500'}`}></span></span>
                      <span className="text-sm font-bold">{infinityStatus === 'working' ? 'تعمل بكفاءة' : 'متوقفة للتحديثات'}</span>
                    </div>
                  </div>
                </div>

                {/* --- Tabs --- */}
                <div className="flex justify-center mb-12 fade-in-up delay-400 relative z-10">
                  <div className="glass-panel p-2 rounded-2xl flex flex-wrap justify-center gap-2">
                    <button onClick={() => setActiveTab('visual')} className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all ${activeTab === 'visual' ? 'bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>
                      <Icon name="video" className="w-5 h-5" /> المرئي
                    </button>
                    <button onClick={() => setActiveTab('written')} className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all ${activeTab === 'written' ? 'bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>
                      <Icon name="penTool" className="w-5 h-5" /> المكتوب
                    </button>
                    <button onClick={() => setActiveTab('offers')} className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all ${activeTab === 'offers' ? 'bg-gradient-to-r from-pink-600 to-rose-600 text-white shadow-lg' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>
                      <Icon name="tag" className="w-5 h-5" /> العروض
                    </button>
                  </div>
                </div>

                <div className="relative min-h-[400px]">
                  {isLoadingData ? (
                    <div className="text-center py-20 text-purple-400 animate-pulse">جاري تحميل البيانات...</div>
                  ) : (
                    <>
                      {/* --- المحتوى المرئي --- */}
                      {activeTab === 'visual' && (
                        <div className="fade-in-up">
                          <div className="flex flex-wrap justify-center gap-2 mb-10">
                            {visualCategories.map((cat) => (
                              <button key={cat} onClick={() => setVisualFilter(cat)} className={`px-4 py-2 rounded-full text-sm font-bold transition-all ${visualFilter === cat ? 'bg-purple-500/20 text-purple-300 border border-purple-500/50 shadow-[0_0_15px_rgba(168,85,247,0.2)]' : 'bg-black/20 text-gray-400 border border-white/5 hover:border-white/10 hover:text-white'}`}>
                                {cat}
                              </button>
                            ))}
                          </div>
                          {filteredVisualContent.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                              {filteredVisualContent.map((item, i) => (
                                <div key={item.id || i} onClick={() => window.open(item.link, '_blank')} className="group relative rounded-3xl overflow-hidden glass-panel cursor-pointer aspect-video border border-white/5 hover:border-purple-500/50 transition-all">
                                  <img src={item.image} alt={item.title} className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-70 group-hover:opacity-40" />
                                  <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/50 to-transparent"></div>
                                  <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-500">
                                    <div className="w-16 h-16 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center group-hover:animate-bounce">
                                      <Icon name="externalLink" className="w-6 h-6 text-white" />
                                    </div>
                                  </div>
                                  <div className="absolute bottom-0 left-0 right-0 p-6">
                                    <span className="inline-block px-3 py-1 bg-purple-500/30 text-purple-200 rounded-lg text-xs font-bold mb-2">{item.category}</span>
                                    <div className="flex justify-between items-end">
                                      <h3 className="text-xl font-bold text-white">{item.title}</h3>
                                      <span className="text-gray-300 text-xs bg-black/60 px-2 py-1 rounded">{item.duration}</span>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          ) : processingUI }
                        </div>
                      )}

                      {/* --- المحتوى المكتوب --- */}
                      {activeTab === 'written' && (
                        <div className="fade-in-up">
                          {writtenContentData.length > 0 ? (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                              {writtenContentData.map((item, index) => (
                                <div key={item.id || index} className="group glass-panel rounded-3xl p-8 hover:bg-white/5 transition-all border border-white/5 hover:border-purple-500/30 flex flex-col justify-between">
                                  <div>
                                    <div className="flex justify-between items-start mb-6">
                                      <div className="w-12 h-12 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400"><Icon name="fileText" className="w-6 h-6" /></div>
                                      <span className="text-gray-500 text-sm bg-black/30 px-3 py-1 rounded-full">{item.date}</span>
                                    </div>
                                    <h3 className="text-2xl font-bold mb-4 text-white group-hover:text-purple-400 transition-colors">{item.title}</h3>
                                    <p className="text-gray-400 leading-relaxed mb-8">{item.excerpt}</p>
                                  </div>
                                  <div className="flex justify-between items-center pt-6 border-t border-white/5">
                                    <div className="flex items-center gap-3">
                                      <div className="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center"><Icon name="penTool" className="w-4 h-4 text-gray-300" /></div>
                                      <span className="text-gray-400 text-sm font-semibold">{item.author}</span>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          ) : processingUI}
                        </div>
                      )}

                      {/* --- العروض --- */}
                      {activeTab === 'offers' && (
                        <div className="fade-in-up">
                          {offersContentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                              {offersContentData.map((offer, index) => (
                                <div key={offer.id || index} className="relative overflow-hidden glass-panel rounded-3xl border border-white/10 transition-all hover:-translate-y-2 group">
                                  <div className={`absolute top-0 right-0 w-full h-2 bg-gradient-to-l ${offer.color}`}></div>
                                  <div className="p-8">
                                    <span className={`inline-block px-4 py-1.5 rounded-full text-sm font-bold mb-4 bg-gradient-to-r ${offer.color} text-white`}>{offer.discount}</span>
                                    <h3 className="text-2xl font-black text-white mb-4">{offer.title}</h3>
                                    <p className="text-gray-400 leading-relaxed mb-8 border-b border-white/10 pb-6">{offer.description}</p>
                                    <span className="text-sm font-medium text-gray-500 bg-black/40 px-3 py-1 rounded-md">{offer.validity}</span>
                                  </div>
                                </div>
                              ))}
                            </div>
                          ) : processingUI}
                        </div>
                      )}
                    </>
                  )}
                </div>
              </main>
              <footer className="border-t border-white/5 mt-10 py-6 text-center text-gray-500 text-sm">
                © {new Date().getFullYear()} قسم التسويق و الميديا برودكشن.
              </footer>
            </div>
          )}
        </div>
      );
    }
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
