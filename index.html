<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قسم التسويق و الميديا برودكشن | المنصة الإبداعية</title>
  
  <!-- استدعاء Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- استدعاء Babel لتشغيل كود React داخل المتصفح مباشرة -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- أنماط CSS مخصصة للحركات والخطوط -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap');
    
    body {
      font-family: 'Cairo', sans-serif;
      background-color: #020617;
      margin: 0;
      padding: 0;
    }

    .bg-animated {
      background: linear-gradient(-45deg, #0f172a, #1e1b4b, #3b0764, #000000);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .fade-in-up {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    .delay-300 { animation-delay: 300ms; }
    .delay-400 { animation-delay: 400ms; }

    .floating {
      animation: floating 3s ease-in-out infinite;
    }

    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* حركات وتأثيرات الأيقونة الـ 3D */
    .perspective-1000 {
      perspective: 1000px;
    }
    .preserve-3d {
      transform-style: preserve-3d;
    }
    .animate-float-3d {
      animation: float3d 6s ease-in-out infinite;
    }
    @keyframes float3d {
      0% { transform: translateY(0px) rotateX(15deg) rotateY(-20deg); }
      50% { transform: translateY(-15px) rotateX(25deg) rotateY(10deg); }
      100% { transform: translateY(0px) rotateX(15deg) rotateY(-20deg); }
    }

    /* تخصيص شريط التمرير */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a; 
    }
    ::-webkit-scrollbar-thumb {
      background: #6b21a8; 
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #9333ea; 
    }
  </style>
</head>
<body>
  <!-- الحاوية الأساسية لتطبيق React -->
  <div id="root"></div>

  <!-- كود React (تم تعديله للعمل كـ Module) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    // استيراد أيقونات lucide الأساسية
    import * as icons from 'https://esm.sh/lucide@latest';

    // مكون مساعد لرسم الأيقونات بأمان
    const Icon = ({ name, className }) => {
      const iconRef = useRef(null);

      useEffect(() => {
        if (iconRef.current && icons.icons[name]) {
          iconRef.current.innerHTML = '';
          const iconNode = icons.icons[name].toSvg();
          
          const template = document.createElement('template');
          template.innerHTML = iconNode.trim();
          const svgElement = template.content.firstChild;
          
          if (className) {
            svgElement.setAttribute('class', className);
          }
          iconRef.current.appendChild(svgElement);
        }
      }, [name, className]);

      return <span ref={iconRef} className={`inline-flex items-center justify-center ${className || ''}`} />;
    };

    function App() {
      // حالة تسجيل الدخول
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      
      // بيانات نموذج تسجيل الدخول
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [rememberMe, setRememberMe] = useState(false); // حالة زر تذكرني
      const [loginError, setLoginError] = useState('');
      const [isLoggingIn, setIsLoggingIn] = useState(false);

      // التحقق من حالة الدخول المحفوظة عند تحميل الصفحة
      useEffect(() => {
        const savedAuth = localStorage.getItem('isMediaProdAuth');
        if (savedAuth === 'true') {
          setIsAuthenticated(true);
        }
      }, []);

      // حالة التنقل والفلاتر
      const [activeTab, setActiveTab] = useState('visual'); // 'visual' | 'written' | 'offers'
      const [visualFilter, setVisualFilter] = useState('الكل');

      // دالة تسجيل الدخول
      const handleLogin = (e) => {
        e.preventDefault();
        setLoginError('');
        setIsLoggingIn(true);

        setTimeout(() => {
          if (
            (email === 'info@ieatd.com' && password === '123') ||
            (email === 'mohamed.cms737@gmail.com' && password === 'menna123456789##@0') ||
            (email === 'ieatdeslam@gmail.com' && password === 'islamieatd.com123') ||
            (email === 'ieatdmostafa@gmail.com' && password === 'mostafa279941ieatd.com#@0')
          ) {
            setIsAuthenticated(true);
            // حفظ حالة الدخول إذا تم تحديد "تذكرني"
            if (rememberMe) {
              localStorage.setItem('isMediaProdAuth', 'true');
            }
          } else {
            setLoginError('بيانات الدخول غير صحيحة، يرجى المحاولة مرة أخرى.');
          }
          setIsLoggingIn(false);
        }, 1200);
      };

      // دالة تسجيل الخروج
      const handleLogout = () => {
        setIsAuthenticated(false);
        setEmail('');
        setPassword('');
        setRememberMe(false);
        setActiveTab('visual');
        // مسح بيانات الدخول المحفوظة
        localStorage.removeItem('isMediaProdAuth');
      };

      // فئات المحتوى المرئي
      const visualCategories = ['الكل', 'بوست', 'كاروسيل', 'بروفايل', 'ريلز او فيديوهات', 'شروحات لمنصة الأكاديمية', 'شروحات لمنصة انفينيتي'];

      // واجهة رسالة "قيد المعالجة" الموحدة
      const processingUI = (
        <div className="w-full flex flex-col items-center justify-center py-20 text-center fade-in-up glass-panel rounded-3xl border border-white/5">
          <div className="w-24 h-24 mb-8 relative flex items-center justify-center">
            {/* دوائر متحركة للتحميل */}
            <span className="absolute inline-flex h-full w-full rounded-full bg-purple-500/20 animate-ping"></span>
            <div className="absolute inset-0 border-t-4 border-b-4 border-purple-500 rounded-full animate-spin"></div>
            <div className="absolute inset-2 border-l-4 border-r-4 border-blue-500 rounded-full animate-spin" style={{ animationDirection: 'reverse', animationDuration: '1.5s' }}></div>
            <Icon name="loader" className="w-8 h-8 text-white animate-pulse" />
          </div>
          <h3 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-l from-purple-400 to-blue-400 mb-4 drop-shadow-md">
            البيانات الآن قيد المعالجة
          </h3>
          <p className="text-gray-400 text-lg max-w-lg mx-auto leading-relaxed">
            نعمل في الوقت الحالي على تجهيز وتحديث المحتوى الإبداعي الخاص بهذا القسم. يرجى العودة لاحقاً لرؤية أحدث أعمالنا!
          </p>
        </div>
      );

      return (
        <div dir="rtl" className="min-h-screen text-white font-sans overflow-x-hidden selection:bg-purple-500 selection:text-white">
          {!isAuthenticated ? (
            /* ==================== شاشة تسجيل الدخول ==================== */
            <div className="min-h-screen flex items-center justify-center bg-animated relative overflow-hidden px-4">
              <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse"></div>
              <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse" style={{ animationDelay: '2s' }}></div>

              <div className="glass-panel w-full max-w-md p-10 rounded-3xl z-10 fade-in-up shadow-2xl shadow-purple-900/20">
                <div className="flex flex-col items-center mb-8">
                  
                  {/* الأيقونة الـ 3D المتحركة المعبرة عن القسمين */}
                  <div className="relative w-28 h-28 mb-10 perspective-1000">
                    <div className="w-full h-full relative preserve-3d animate-float-3d">
                      
                      {/* طبقة التسويق (الخلفية) - مكبر الصوت */}
                      <div 
                        className="absolute inset-0 bg-gradient-to-br from-blue-600/30 to-cyan-500/30 backdrop-blur-md rounded-2xl border border-blue-400/20 flex items-center justify-center shadow-lg"
                        style={{ transform: 'translateZ(-30px)' }}
                      >
                        <Icon name="megaphone" className="w-10 h-10 text-blue-200 opacity-60 transform -rotate-12" />
                      </div>
                      
                      {/* طبقة وسطى زجاجية للعمق */}
                      <div 
                        className="absolute inset-0 bg-white/5 backdrop-blur-sm rounded-2xl border border-white/10"
                        style={{ transform: 'translateZ(0px) scale(0.95)' }}
                      ></div>

                      {/* طبقة الميديا (الأمامية البارزة) - زر التشغيل */}
                      <div 
                        className="absolute inset-0 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-2xl border border-white/30 flex items-center justify-center shadow-[0_0_35px_rgba(168,85,247,0.6)]"
                        style={{ transform: 'translateZ(30px)' }}
                      >
                        <Icon name="play" className="w-12 h-12 text-white ml-2 fill-current" />
                      </div>
                      
                    </div>
                  </div>

                  <h1 className="text-3xl sm:text-4xl font-black bg-clip-text text-transparent bg-gradient-to-l from-blue-400 via-purple-400 to-pink-400 mb-2 drop-shadow-[0_0_15px_rgba(192,132,252,0.3)] tracking-tight text-center">
                    قسم التسويق <br className="sm:hidden" /> والميديا برودكشن
                  </h1>
                  <p className="text-gray-400 text-sm mt-1">البوابة الخاصة بفريق الإبداع</p>
                </div>

                <form onSubmit={handleLogin} className="space-y-6">
                  <div>
                    <label className="block text-sm font-medium text-gray-300 mb-2">البريد الإلكتروني</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <Icon name="user" className="h-5 w-5 text-gray-500" />
                      </div>
                      <input
                        type="email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        className="block w-full pr-10 pl-3 py-3 border border-gray-700 rounded-xl leading-5 bg-gray-900/50 text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all duration-300"
                        placeholder="info@ieatd.com"
                        required
                        dir="ltr"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-300 mb-2">كلمة المرور</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <Icon name="lock" className="h-5 w-5 text-gray-500" />
                      </div>
                      <input
                        type={showPassword ? 'text' : 'password'}
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                        className="block w-full pr-10 pl-10 py-3 border border-gray-700 rounded-xl leading-5 bg-gray-900/50 text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all duration-300"
                        placeholder="••••••••"
                        required
                        dir="ltr"
                      />
                      <button
                        type="button"
                        onClick={() => setShowPassword(!showPassword)}
                        className="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 hover:text-gray-300 transition-colors"
                      >
                        {showPassword ? <Icon name="eyeOff" className="h-5 w-5" /> : <Icon name="eye" className="h-5 w-5" />}
                      </button>
                    </div>
                  </div>

                  {/* خيار تذكرني */}
                  <div className="flex items-center">
                    <input
                      id="remember-me"
                      name="remember-me"
                      type="checkbox"
                      checked={rememberMe}
                      onChange={(e) => setRememberMe(e.target.checked)}
                      className="h-4 w-4 rounded border-gray-700 bg-gray-900/50 text-purple-500 focus:ring-purple-500 focus:ring-offset-gray-900 cursor-pointer accent-purple-500 transition-all"
                    />
                    <label htmlFor="remember-me" className="mr-2 block text-sm text-gray-300 cursor-pointer select-none">
                      تذكرني للزيارات القادمة
                    </label>
                  </div>

                  {loginError && (
                    <div className="text-red-400 text-sm bg-red-950/50 p-3 rounded-lg border border-red-900/50 text-center animate-pulse">
                      {loginError}
                    </div>
                  )}

                  <button
                    type="submit"
                    disabled={isLoggingIn}
                    className="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 focus:ring-offset-gray-900 transition-all duration-300 transform hover:scale-[1.02] disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none shadow-lg shadow-purple-600/20"
                  >
                    {isLoggingIn ? (
                      <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                      </svg>
                    ) : (
                      'تسجيل الدخول'
                    )}
                  </button>
                </form>
              </div>
            </div>
          ) : (
            /* ==================== لوحة التحكم / صفحة الهبوط ==================== */
            <div className="min-h-screen bg-[#020617] relative">
              <div className="absolute top-0 left-0 right-0 h-[500px] bg-gradient-to-b from-purple-900/20 to-transparent pointer-events-none"></div>

              <header className="fixed top-0 w-full z-50 glass-panel border-b border-white/5">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center gap-2 sm:gap-4 fade-in-up">
                      
                      {/* الأيقونة الـ 3D المصغرة والمتحركة في الهيدر */}
                      <div className="relative w-12 h-12 perspective-1000 ml-1 sm:ml-2">
                        <div className="w-full h-full relative preserve-3d animate-float-3d">
                          
                          {/* طبقة التسويق (الخلفية) - مكبر الصوت */}
                          <div 
                            className="absolute inset-0 bg-gradient-to-br from-blue-600/30 to-cyan-500/30 backdrop-blur-md rounded-xl border border-blue-400/20 flex items-center justify-center shadow-lg"
                            style={{ transform: 'translateZ(-15px)' }}
                          >
                            <Icon name="megaphone" className="w-5 h-5 text-blue-200 opacity-60 transform -rotate-12" />
                          </div>
                          
                          {/* طبقة وسطى زجاجية للعمق */}
                          <div 
                            className="absolute inset-0 bg-white/5 backdrop-blur-sm rounded-xl border border-white/10"
                            style={{ transform: 'translateZ(0px) scale(0.95)' }}
                          ></div>

                          {/* طبقة الميديا (الأمامية البارزة) - زر التشغيل */}
                          <div 
                            className="absolute inset-0 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-xl border border-white/30 flex items-center justify-center shadow-[0_0_20px_rgba(168,85,247,0.5)]"
                            style={{ transform: 'translateZ(15px)' }}
                          >
                            <Icon name="play" className="w-5 h-5 text-white ml-1 fill-current" />
                          </div>
                          
                        </div>
                      </div>

                      <span className="text-lg sm:text-2xl font-black bg-clip-text text-transparent bg-gradient-to-l from-blue-400 via-purple-400 to-pink-400 tracking-tight">
                        قسم التسويق والميديا برودكشن
                      </span>
                    </div>
                    
                    {/* زر تسجيل الخروج الشيك والتفاعلي */}
                    <button
                      onClick={handleLogout}
                      className="group fade-in-up flex items-center gap-3 px-3 py-2 sm:px-5 sm:py-2.5 rounded-xl bg-white/5 hover:bg-red-500/10 border border-white/10 hover:border-red-500/30 text-gray-300 hover:text-red-400 transition-all duration-500"
                    >
                      <span className="text-sm font-bold hidden sm:block group-hover:-translate-x-1 transition-transform">تسجيل خروج</span>
                      <div className="w-8 h-8 rounded-lg bg-white/5 group-hover:bg-red-500/20 flex items-center justify-center transition-colors">
                        <Icon name="logOut" className="w-4 h-4 transform group-hover:scale-110 transition-transform" />
                      </div>
                    </button>

                  </div>
                </div>
              </header>

              <main className="pt-32 pb-20 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
                <div className="text-center mb-12 relative z-10">
                  <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full glass-panel mb-6 fade-in-up text-purple-400 text-sm font-semibold">
                    <Icon name="sparkles" className="w-4 h-4" />
                    <span>المنصة الإبداعية المتكاملة</span>
                  </div>
                  <h1 className="text-5xl md:text-7xl font-black mb-6 tracking-tight fade-in-up delay-100">
                    حيث يتحول <span className="bg-clip-text text-transparent bg-gradient-to-l from-purple-400 to-blue-500">الخيال</span> إلى واقع
                  </h1>
                  <p className="mt-4 text-xl text-gray-400 max-w-3xl mx-auto fade-in-up delay-200 leading-relaxed">
                    نحن قسم التسويق و الميديا برودكشن، نصنع المحتوى المرئي والمكتوب الذي يبني جسوراً من الثقة والتميز مع جمهورنا.
                  </p>
                </div>

                {/* ==================== قسم حالة المنصات ==================== */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-16 fade-in-up delay-300 relative z-10 max-w-4xl mx-auto">
                  {/* منصة الأكاديمية */}
                  <div className="glass-panel p-5 rounded-2xl border-r-4 border-r-emerald-500 flex items-center justify-between shadow-lg shadow-emerald-500/5 hover:bg-white/5 transition-colors">
                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400">
                        <Icon name="checkCircle" className="w-6 h-6" />
                      </div>
                      <div>
                        <h3 className="font-bold text-white text-lg">المنصة الخاصة بالأكاديمية</h3>
                        <p className="text-gray-400 text-sm">النظام الآلي والمحتوى التعليمي</p>
                      </div>
                    </div>
                    <div className="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-4 py-2 rounded-full">
                      <div className="relative flex h-3 w-3">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                      </div>
                      <span className="text-emerald-400 text-sm font-bold">تعمل بكفاءة</span>
                    </div>
                  </div>

                  {/* منصة انفينيتي */}
                  <div className="glass-panel p-5 rounded-2xl border-r-4 border-r-orange-500 flex items-center justify-between shadow-lg shadow-orange-500/5 hover:bg-white/5 transition-colors">
                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 rounded-xl bg-orange-500/10 flex items-center justify-center text-orange-400">
                        <Icon name="alertTriangle" className="w-6 h-6" />
                      </div>
                      <div>
                        <h3 className="font-bold text-white text-lg">المنصة الخاصة بانفينيتي</h3>
                        <p className="text-gray-400 text-sm">بوابة التجار والمبيعات</p>
                      </div>
                    </div>
                    <div className="flex items-center gap-2 bg-orange-500/10 border border-orange-500/20 px-4 py-2 rounded-full">
                      <div className="relative flex h-3 w-3">
                        <span className="animate-pulse absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-3 w-3 bg-orange-500"></span>
                      </div>
                      <span className="text-orange-400 text-sm font-bold">متوقفة للتحديثات</span>
                    </div>
                  </div>
                </div>

                {/* ==================== أزرار التبديل (Tabs) ==================== */}
                <div className="flex justify-center mb-12 fade-in-up delay-400 relative z-10">
                  <div className="glass-panel p-2 rounded-2xl flex flex-wrap justify-center gap-2">
                    <button
                      onClick={() => setActiveTab('visual')}
                      className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all duration-500 ${
                        activeTab === 'visual'
                          ? 'bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg shadow-purple-500/25'
                          : 'text-gray-400 hover:text-white hover:bg-white/5'
                      }`}
                    >
                      <Icon name="video" className="w-5 h-5" />
                      المحتوى المرئي
                    </button>
                    <button
                      onClick={() => setActiveTab('written')}
                      className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all duration-500 ${
                        activeTab === 'written'
                          ? 'bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg shadow-purple-500/25'
                          : 'text-gray-400 hover:text-white hover:bg-white/5'
                      }`}
                    >
                      <Icon name="penTool" className="w-5 h-5" />
                      المحتوى المكتوب
                    </button>
                    <button
                      onClick={() => setActiveTab('offers')}
                      className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all duration-500 ${
                        activeTab === 'offers'
                          ? 'bg-gradient-to-r from-pink-600 to-rose-600 text-white shadow-lg shadow-pink-500/25'
                          : 'text-gray-400 hover:text-white hover:bg-white/5'
                      }`}
                    >
                      <Icon name="tag" className="w-5 h-5" />
                      العروض الفعالة
                    </button>
                  </div>
                </div>

                <div className="relative min-h-[400px]">
                  
                  {/* ==================== المحتوى المرئي ==================== */}
                  {activeTab === 'visual' && (
                    <div className="fade-in-up">
                      {/* شريط فلاتر المحتوى المرئي */}
                      <div className="flex flex-wrap justify-center gap-2 mb-10">
                        {visualCategories.map((category) => (
                          <button
                            key={category}
                            onClick={() => setVisualFilter(category)}
                            className={`px-4 py-2 rounded-full text-sm font-bold transition-all duration-300 ${
                              visualFilter === category
                                ? 'bg-purple-500/20 text-purple-300 border border-purple-500/50 shadow-[0_0_15px_rgba(168,85,247,0.2)]'
                                : 'bg-black/20 text-gray-400 border border-white/5 hover:border-white/10 hover:text-white'
                            }`}
                          >
                            {category}
                          </button>
                        ))}
                      </div>

                      {/* رسالة قيد المعالجة للمحتوى المرئي */}
                      {processingUI}
                    </div>
                  )}

                  {/* ==================== المحتوى المكتوب ==================== */}
                  {activeTab === 'written' && (
                    <div className="fade-in-up">
                      {/* رسالة قيد المعالجة للمحتوى المكتوب */}
                      {processingUI}
                    </div>
                  )}

                  {/* ==================== العروض الفعالة ==================== */}
                  {activeTab === 'offers' && (
                    <div className="fade-in-up">
                      {/* رسالة قيد المعالجة للعروض الفعالة */}
                      {processingUI}
                    </div>
                  )}

                </div>
              </main>
              
              <footer className="border-t border-white/5 mt-10 relative z-10 bg-black/20">
                <div className="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
                  <p className="text-gray-500 text-sm text-center md:text-right">
                    © {new Date().getFullYear()} قسم التسويق و الميديا برودكشن. جميع الحقوق محفوظة.
                  </p>
                  <div className="flex gap-4 text-gray-500">
                    <span className="hover:text-purple-400 cursor-pointer transition-colors">السياسات</span>
                    <span>|</span>
                    <span className="hover:text-purple-400 cursor-pointer transition-colors">الدعم الفني</span>
                  </div>
                </div>
              </footer>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
